<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="FlatFlow logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>

  <!-- House / home icon (outline style) -->
  <path
    d="M50 24 L78 47 L71 47 L71 76 L29 76 L29 47 L22 47 Z"
    fill="none"
    stroke="white"
    stroke-width="4.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Arched door (centred) -->
  <path
    d="M42 76 L42 62 Q42 57 50 57 Q58 57 58 62 L58 76"
    fill="none"
    stroke="white"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Left window -->
  <rect x="31" y="51" width="11" height="9" rx="2"
    fill="none" stroke="white" stroke-width="3.5"/>

  <!-- Rotation arrow (↻) — top-right badge, signals duty rotation -->
  <!-- 270° clockwise arc: from 3-o'clock (89,22) to 6-o'clock (80,31), centre (80,22) r=9 -->
  <path
    d="M89 22 A9 9 0 1 1 80 31"
    fill="none"
    stroke="rgba(255,255,255,0.80)"
    stroke-width="3"
    stroke-linecap="round"
  />
  <!-- Arrowhead at 6-o'clock pointing left (clockwise tangent) -->
  <path
    d="M83 28 L80 31 L83 34"
    fill="none"
    stroke="rgba(255,255,255,0.80)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
